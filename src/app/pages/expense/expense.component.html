<div class="row mb-5 align-items-center">
    <div class="col-md-6">
        <h2 class="fw-bold mb-1">Your Dashboard</h2>
        <p class="text-secondary">Track and manage your spending with ease</p>
    </div>
    <div class="col-md-6 text-md-end">
        <div class="glass-card d-inline-block px-4 py-3 text-start">
            <span class="text-secondary small fw-medium text-uppercase d-block mb-1">Total Balance</span>
            <h3 class="text-success fw-bold mb-0">$ {{totalExpenses}}</h3>
        </div>
    </div>
</div>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">Recent Expenses</h4>
    <a [routerLink]="['/expenseform']" class="btn btn-primary d-flex align-items-center gap-2">
        <i data-lucide="plus-circle"></i> Add Expense
    </a>
</div>

<div class="row g-4">
    @for (item of expenses; track $index) {
    <div class="col-md-6 col-lg-4">
        <div class="glass-card expense-card p-4 h-100 d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <h5 class="fw-bold mb-0 text-truncate">{{item.title}}</h5>
                <span class="price-tag fw-bold">$ {{item.price}}</span>
            </div>
            <p class="text-secondary small flex-grow-1">{{item.description}}</p>
            <div class="d-flex justify-content-end mt-3 pt-3 border-top border-secondary border-opacity-10">
                <button class="btn-icon btn-delete" (click)="deleteExpense(item.key!)" title="Delete Expense">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
        </div>
    </div>
    }
</div>
