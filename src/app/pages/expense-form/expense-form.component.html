<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="glass-card p-5">
            <div class="mb-4">
                <h2 class="fw-bold mb-1">Add Expense</h2>
                <p class="text-secondary small">Fill in the details to record your spending</p>
            </div>

            <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()">
                <div class="mb-4">
                    <label for="title" class="form-label">Title</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25 text-secondary">
                            <i data-lucide="type"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 ps-0" name="title" id="title" placeholder="What did you buy?"
                            formControlName="title">
                    </div>
                    <div *ngIf="expenseForm.get('title')?.touched && expenseForm.get('title')?.invalid" class="mt-2">
                        <small class="text-danger d-block" *ngIf="expenseForm.get('title')?.errors?.['required']">Title
                            is required.</small>
                        <small class="text-danger d-block" *ngIf="expenseForm.get('title')?.errors?.['minlength']">Minimum
                            5 characters.</small>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="price" class="form-label">Price</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25 text-secondary">
                            <i data-lucide="dollar-sign"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 ps-0" name="price" id="price" 
                            placeholder="0.00" formControlName="price">
                    </div>
                    <div *ngIf="expenseForm.get('price')?.touched && expenseForm.get('price')?.invalid" class="mt-2">
                        <small class="text-danger d-block" *ngIf="expenseForm.get('price')?.errors?.['required']">Price is
                            required.</small>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Description</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25 text-secondary align-items-start pt-3">
                            <i data-lucide="align-left"></i>
                        </span>
                        <textarea name="description" id="description" class="form-control border-start-0 ps-0" rows="3"
                            placeholder="Add some notes..." formControlName="description"></textarea>
                    </div>
                    <div *ngIf="expenseForm.get('description')?.touched && expenseForm.get('description')?.invalid" class="mt-2">
                        <small class="text-danger d-block" *ngIf="expenseForm.get('description')?.errors?.['required']">Description
                            is required.</small>
                        <small class="text-danger d-block" *ngIf="expenseForm.get('description')?.errors?.['minlength']">Minimum
                            10 characters.</small>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-3 mt-2 d-flex align-items-center justify-content-center gap-2">
                    <i data-lucide="send"></i> Save Expense
                </button>
            </form>
        </div>
    </div>
</div>
