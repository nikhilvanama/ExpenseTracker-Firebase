<!-- Global Navigation Bar: Glassmorphic Design -->
<nav class="glass-nav sticky-top py-3">
  <div class="container d-flex justify-content-between align-items-center">
    <!-- Brand Logo: Links back to dashboard -->
    <a class="navbar-brand fw-bold text-white fs-4" routerLink="/">
      <span class="text-accent">Expense</span>Tracker
    </a>
    
    <!-- Navigation Links -->
    <div class="d-flex gap-4">
      <!-- 'routerLinkActive' highlights the link when the route matches -->
      <a class="nav-link text-secondary fw-medium" routerLinkActive="text-white active" [routerLinkActiveOptions]="{exact: true}" routerLink="/expenseform">Add New</a>
      <a class="nav-link text-secondary fw-medium" routerLinkActive="text-white active" [routerLinkActiveOptions]="{exact: true}" routerLink="/">All Expenses</a>
    </div>
  </div>
</nav>

<!-- Main Page Content: Serves as the placeholder for different page components -->
<main class="container py-5">
  <router-outlet></router-outlet>
</main>
